name: PR Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Build & Deploy Preview to Vercel ───────────────────────────────────────
  preview:
    name: "🔭 Deploy PR Preview → Vercel"
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING || secrets.VITE_API_URL }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              '## 🔭 Preview Deployment Ready',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | ${url} |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${{ github.head_ref }}\` |`,
              '',
              '### Quick Links',
              `- [Student Portal](${url}/login)`,
              `- [Admin Dashboard](${url}/admin/login)`,
              `- [Kiosk Interface](${url}/kiosk)`,
              '',
              '_Preview auto-updates on each commit to this PR._'
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview Deployment Ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
